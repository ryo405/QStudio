<style>
:root {
  --bg:#f7f7fa; --surface:#ffffff; --border:#e8e8f0; --border2:#d0d0e0;
  --text:#111118; --muted:#888899; --muted2:#555566;
  --accent:#d63030; --accent-soft:rgba(214,48,48,0.07); --accent-hover:#b82020;
  --green:#22aa66; --radius:16px; --radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overscroll-behavior-y:none;}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;transition:box-shadow .2s;}
.header.scrolled{box-shadow:0 2px 12px rgba(0,0,0,0.07);}
.header-brand{display:flex;align-items:center;gap:10px;}
.brand-logo{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-logo svg{color:#fff;}
.brand-name{font-size:15px;font-weight:800;letter-spacing:-0.3px;}
.brand-sub{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:1px;}
.btn-open-upload{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:var(--radius-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s,transform .15s;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-open-upload:hover{background:var(--accent-hover);transform:translateY(-1px);}
.btn-open-upload:active{transform:scale(0.97);}

/* PULL TO REFRESH */
.ptr-wrap{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:99;pointer-events:none;transition:opacity .2s;opacity:0;}
.ptr-wrap.show{opacity:1;}
.ptr-pill{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 14px 6px 10px;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted2);box-shadow:0 4px 16px rgba(0,0,0,0.08);white-space:nowrap;font-family:'Space Mono',monospace;}
.ptr-spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
.ptr-icon{width:16px;height:16px;color:var(--accent);flex-shrink:0;transition:transform .3s;}

/* MAIN */
.main{max-width:640px;margin:0 auto;padding:28px 16px 0;}

/* SKELETON */
.skeleton-list{display:flex;flex-direction:column;gap:14px;}
.skeleton-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:pulse 1.4s ease-in-out infinite;}
.skeleton-thumb{width:100%;height:200px;background:#eeeef5;}
.skeleton-body{padding:16px;}
.skeleton-line{background:#eeeef5;border-radius:6px;margin-bottom:10px;}
.skeleton-line.title{height:18px;width:55%;}
.skeleton-line.desc1{height:13px;width:90%;}
.skeleton-line.desc2{height:13px;width:70%;margin-bottom:16px;}
.skeleton-btns{display:flex;gap:8px;}
.skeleton-btn{height:36px;background:#eeeef5;border-radius:var(--radius-sm);}
.skeleton-btn.sm{flex:1;}.skeleton-btn.lg{flex:2;}.skeleton-btn.xs{width:38px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.55;}}

.section-label{font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* RIG CARD */
.rig-list{display:flex;flex-direction:column;gap:14px;}
.rig-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .25s,transform .25s,opacity .3s;animation:cardIn .35s cubic-bezier(.4,0,.2,1) both;}
.rig-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.07);transform:translateY(-2px);}
.rig-card.removing{opacity:0;transform:scale(0.96) translateY(-8px);pointer-events:none;}
@keyframes cardIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.rig-thumb{width:100%;height:200px;object-fit:cover;display:block;background:var(--bg);}
.rig-thumb-placeholder{width:100%;height:200px;background:linear-gradient(135deg,#f0f0f8,#e4e4f0);display:flex;align-items:center;justify-content:center;}
.rig-thumb-placeholder svg{color:#ccc;}
.rig-body{padding:16px;}
.rig-meta{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.rig-owner-badge{font-size:10px;font-family:'Space Mono',monospace;background:var(--accent-soft);color:var(--accent);border:1px solid rgba(214,48,48,0.15);padding:2px 8px;border-radius:100px;}
.rig-time{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
.rig-title{font-size:16px;font-weight:800;letter-spacing:-0.2px;margin-bottom:5px;}
.rig-desc{font-size:13px;color:var(--muted2);line-height:1.55;margin-bottom:14px;}
.rig-actions{display:flex;gap:8px;}
.btn-copy{flex:1;background:transparent;border:1px solid var(--border2);color:var(--muted2);padding:9px 0;border-radius:var(--radius-sm);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;}
.btn-copy:hover{border-color:var(--accent);color:var(--accent);}
.btn-copy.copied{border-color:var(--green);color:var(--green);}
.btn-download{flex:2;background:var(--accent);border:none;color:#fff;padding:9px 0;border-radius:var(--radius-sm);font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;transition:background .2s;text-align:center;text-decoration:none;display:block;line-height:1.4;}
.btn-download:hover{background:var(--accent-hover);}
.btn-delete{width:38px;background:transparent;border:1px solid #f0d8d8;color:#cc8888;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.btn-delete:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

/* COMING SOON */
.coming-soon{border:2px dashed var(--border2);border-radius:var(--radius);padding:40px 24px;text-align:center;margin-top:14px;animation:cardIn .35s ease both;}
.coming-soon-title{font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:5px;}
.coming-soon-sub{font-size:12px;color:#bbbbd0;font-style:italic;}

/* SOCIAL */
.social-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;margin-top:24px;text-align:center;animation:cardIn .35s ease both;}
.social-title{font-size:15px;font-weight:800;margin-bottom:18px;}
.social-icons{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;}
.social-icon{width:48px;height:48px;border-radius:14px;border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .2s,box-shadow .2s;}
.social-icon:hover{transform:scale(1.1);box-shadow:0 4px 14px rgba(0,0,0,0.1);}
.social-icon:active{transform:scale(0.95);}
.social-icon svg{width:22px;height:22px;}

/* FOOTER */
.footer{text-align:center;padding:24px 20px 36px;font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:24px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(5px);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:8px 20px 32px;animation:sheetUp .3s cubic-bezier(.4,0,.2,1);border-top:1px solid var(--border);box-shadow:0 -8px 40px rgba(0,0,0,0.1);}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:12px auto 20px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:16px;font-weight:800;}
.modal-close{width:30px;height:30px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted2);transition:all .2s;}
.modal-close:hover{border-color:var(--accent);color:var(--accent);}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);padding:10px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--accent);}
.form-textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);padding:10px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;resize:vertical;min-height:76px;}
.form-textarea:focus{border-color:var(--accent);}
.img-zone{border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:22px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:var(--bg);}
.img-zone:hover,.img-zone.drag{border-color:var(--accent);background:var(--accent-soft);}
.img-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-zone-icon{margin-bottom:8px;color:var(--muted);}
.img-zone-text{font-size:13px;color:var(--muted2);font-weight:500;}
.img-zone-hint{font-size:11px;color:var(--muted);margin-top:3px;}
.img-preview-wrap{margin-top:10px;display:none;border-radius:10px;overflow:hidden;border:1px solid var(--border);position:relative;}
.img-preview-wrap img{width:100%;max-height:160px;object-fit:cover;display:block;}
.img-remove{position:absolute;top:8px;right:8px;width:26px;height:26px;background:rgba(0,0,0,0.5);border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.img-remove:hover{background:rgba(214,48,48,0.85);}
.prog-wrap{display:none;margin-top:10px;}
.prog-bar{height:3px;background:var(--border2);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;width:0%;background:var(--accent);border-radius:99px;transition:width .3s;}
.prog-text{font-size:11px;color:var(--muted);margin-top:4px;font-family:'Space Mono',monospace;}
.modal-footer{display:flex;gap:8px;margin-top:18px;}
.btn-cancel{flex:1;background:transparent;border:1px solid var(--border2);color:var(--muted2);padding:12px;border-radius:var(--radius-sm);font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:var(--muted);color:var(--text);}
.btn-submit{flex:2;background:var(--accent);border:none;color:#fff;padding:12px;border-radius:var(--radius-sm);font-family:'Space Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-submit:hover{background:var(--accent-hover);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#111118;color:#fff;padding:10px 20px;border-radius:100px;font-size:12px;font-family:'Space Mono',monospace;opacity:0;transition:all .28s cubic-bezier(.4,0,.2,1);z-index:500;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:#166534;}
.toast.error{background:#7f1d1d;}

@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<!-- UPLOAD MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Upload Rig</div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">Thumbnail</label>
      <div class="img-zone" id="imgZone">
        <input type="file" id="imgFile" accept="image/*" onchange="handleImgSelect(this)">
        <div class="img-zone-icon">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="img-zone-text">Pilih atau drop gambar</div>
        <div class="img-zone-hint">JPG, PNG — dikompresi otomatis</div>
      </div>
      <div class="img-preview-wrap" id="imgPreviewWrap">
        <img id="imgPreviewEl" src="" alt="preview">
        <button class="img-remove" onclick="removeImg()">
          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="prog-wrap" id="progWrap">
        <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
        <div class="prog-text" id="progText">Memproses...</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Judul</label>
      <input class="form-input" id="inputTitle" type="text" maxlength="60">
    </div>
    <div class="form-group">
      <label class="form-label">Deskripsi</label>
      <textarea class="form-textarea" id="inputDesc" maxlength="300"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Link Download</label>
      <input class="form-input" id="inputLink" type="url">
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-submit" id="btnSubmit" onclick="submitRig()">Upload</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DEVICE ID — tiap device/browser punya ID sendiri, buat ownership ───
function getDeviceId() {
  let id = localStorage.getItem('rig_device_id');
  if (!id) {
    id = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('rig_device_id', id);
  }
  return id;
}
const DEVICE_ID = getDeviceId();

// ─── REALTIME LISTENER ───
let firstLoad = true;
rigsRef.on('value', snap => {
  const skeleton = document.getElementById('skeletonList');
  const list     = document.getElementById('rigList');
  const cs       = document.getElementById('comingSoon');

  if (firstLoad) {
    firstLoad = false;
    skeleton.style.display = 'none';
    list.style.display = 'flex';
  }

  list.innerHTML = '';

  if (!snap.exists()) {
    cs.style.display = 'block';
    return;
  }

  cs.style.display = 'none';
  const rigs = [];
  snap.forEach(child => rigs.unshift({ id: child.key, ...child.val() }));
  rigs.forEach((rig, i) => {
    const card = buildCard(rig);
    card.style.animationDelay = (i * 0.05) + 's';
    list.appendChild(card);
  });
});

function buildCard(rig) {
  const div = document.createElement('div');
  div.className = 'rig-card';
  div.dataset.id = rig.id;

  const isOwner = rig.deviceId === DEVICE_ID;
  const thumb = rig.img
    ? `<img class="rig-thumb" src="${rig.img}" loading="lazy" alt="${rig.title}">`
    : `<div class="rig-thumb-placeholder"><svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;

  const timeStr    = rig.createdAt ? formatTime(rig.createdAt) : '';
  const ownerBadge = isOwner ? `<span class="rig-owner-badge">Upload lo</span>` : '';
  const deleteBtn  = isOwner
    ? `<button class="btn-delete" onclick="deleteRig('${rig.id}')" title="Hapus"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg></button>`
    : '';

  div.innerHTML = `
    ${thumb}
    <div class="rig-body">
      <div class="rig-meta">${ownerBadge}<span class="rig-time">${timeStr}</span></div>
      <div class="rig-title">${rig.title}</div>
      <div class="rig-desc">${rig.desc}</div>
      <div class="rig-actions">
        <button class="btn-copy" onclick="copyLink('${rig.link}',this)">Salin Link</button>
        <a class="btn-download" href="${rig.link}" target="_blank" rel="noopener">Unduh</a>
        ${deleteBtn}
      </div>
    </div>`;
  return div;
}

function formatTime(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(diff / 86400000);
  if (m < 1)  return 'Baru saja';
  if (m < 60) return m + ' menit lalu';
  if (h < 24) return h + ' jam lalu';
  return d + ' hari lalu';
}

function copyLink(link, btn) {
  navigator.clipboard.writeText(link).then(() => {
    btn.textContent = 'Tersalin';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Salin Link'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => toast('Gagal salin link', 'error'));
}

function deleteRig(id) {
  if (!confirm('Hapus rig ini?')) return;
  const card = document.querySelector(`.rig-card[data-id="${id}"]`);
  if (card) card.classList.add('removing');
  setTimeout(() => {
    rigsRef.child(id).remove()
      .then(() => toast('Rig dihapus', 'success'))
      .catch(() => { toast('Gagal hapus', 'error'); if (card) card.classList.remove('removing'); });
  }, 280);
}

// ─── MODAL ───
function openModal() { document.getElementById('modalBg').classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal() { document.getElementById('modalBg').classList.remove('open'); document.body.style.overflow=''; resetForm(); }
document.getElementById('modalBg').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });

// ─── IMAGE COMPRESS → BASE64 (tanpa Firebase Storage) ───
let compressedImgData = null;

function handleImgSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const prog = document.getElementById('progWrap');
  const fill = document.getElementById('progFill');
  const text = document.getElementById('progText');
  document.getElementById('imgPreviewWrap').style.display = 'none';
  prog.style.display = 'block'; fill.style.width = '20%'; text.textContent = 'Membaca...';
  const reader = new FileReader();
  reader.onload = e => {
    fill.style.width = '60%'; text.textContent = 'Mengompresi...';
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height, max = 640;
      if (w > max) { h = Math.round(h*(max/w)); w = max; }
      if (h > max) { w = Math.round(w*(max/h)); h = max; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const data = canvas.toDataURL('image/jpeg', 0.62);
      const sizeKB = Math.round(data.length * 0.75 / 1024);
      fill.style.width = '100%';
      if (sizeKB > 900) { text.textContent = 'Terlalu besar, coba foto lebih kecil'; compressedImgData = null; return; }
      compressedImgData = data;
      text.textContent = 'Siap · ' + sizeKB + ' KB';
      document.getElementById('imgPreviewEl').src = data;
      document.getElementById('imgPreviewWrap').style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeImg() {
  compressedImgData = null;
  document.getElementById('imgFile').value = '';
  document.getElementById('imgPreviewWrap').style.display = 'none';
  document.getElementById('progWrap').style.display = 'none';
  document.getElementById('progFill').style.width = '0%';
}

const zone = document.getElementById('imgZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const dt = new DataTransfer(); dt.items.add(file);
    document.getElementById('imgFile').files = dt.files;
    handleImgSelect(document.getElementById('imgFile'));
  }
});

function submitRig() {
  const title = document.getElementById('inputTitle').value.trim();
  const desc  = document.getElementById('inputDesc').value.trim();
  const link  = document.getElementById('inputLink').value.trim();
  const btn   = document.getElementById('btnSubmit');
  if (!title) { toast('Isi judul dulu', 'error'); return; }
  if (!desc)  { toast('Isi deskripsi dulu', 'error'); return; }
  if (!link)  { toast('Isi link download dulu', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Menyimpan...';
  rigsRef.push({ title, desc, link, img: compressedImgData||'', deviceId: DEVICE_ID, createdAt: Date.now() })
    .then(() => { toast('Berhasil diupload!', 'success'); closeModal(); })
    .catch(err => { toast('Gagal: ' + err.message, 'error'); })
    .finally(() => { btn.disabled = false; btn.textContent = 'Upload'; });
}

function resetForm() {
  ['inputTitle','inputDesc','inputLink'].forEach(id => document.getElementById(id).value = '');
  removeImg();
}

// ─── PULL TO REFRESH ───
let ptrStartY = 0, ptrDist = 0, ptrActive = false;
const PTR_THRESHOLD = 72;

document.addEventListener('touchstart', e => {
  if (window.scrollY === 0 && !document.getElementById('modalBg').classList.contains('open')) {
    ptrStartY = e.touches[0].clientY; ptrActive = true;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!ptrActive) return;
  ptrDist = Math.max(0, e.touches[0].clientY - ptrStartY);
  if (ptrDist > 8) {
    const wrap = document.getElementById('ptrWrap');
    const icon = document.getElementById('ptrIcon');
    const text = document.getElementById('ptrText');
    wrap.classList.add('show');
    icon.style.transform = `rotate(${Math.min(ptrDist/PTR_THRESHOLD,1)*180}deg)`;
    text.textContent = ptrDist >= PTR_THRESHOLD ? 'Lepas untuk refresh' : 'Tarik untuk refresh';
  }
}, { passive: true });

document.addEventListener('touchend', () => {
  if (!ptrActive) return;
  ptrActive = false;
  const wrap = document.getElementById('ptrWrap');
  const icon = document.getElementById('ptrIcon');
  const spin = document.getElementById('ptrSpinner');
  const text = document.getElementById('ptrText');

  if (ptrDist >= PTR_THRESHOLD) {
    icon.style.display = 'none'; spin.style.display = 'block'; text.textContent = 'Memuat...';
    setTimeout(() => {
      wrap.classList.remove('show');
      spin.style.display = 'none'; icon.style.display = 'block';
      icon.style.transform = 'rotate(0deg)'; text.textContent = 'Tarik untuk refresh';
      toast('Feed diperbarui', 'success');
    }, 1000);
  } else {
    wrap.classList.remove('show');
    icon.style.transform = 'rotate(0deg)';
  }
  ptrDist = 0;
});

// ─── HEADER SHADOW ───
window.addEventListener('scroll', () => {
  document.getElementById('header').classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

// ─── TOAST ───
let toastTimer;
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' '+type : '');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
